name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud cần fetch-depth: 0 để phân tích tốt hơn

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd the-orbit-fe
          npm install --legacy-peer-deps

      - name: Run Tests with Coverage
        run: |
          cd the-orbit-fe
          npm run test:coverage

      # Bước nộp bài quan trọng nhất: Upload file báo cáo HTML làm Artifact
      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report # Tên artifact giảng viên yêu cầu
          path: the-orbit-fe/coverage/lcov-report/ # Gom toàn bộ folder báo cáo HTML

      # Bước đẩy dữ liệu lên SonarCloud để lấy chỉ số A và Coverage >= 70%
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: the-orbit-fe